<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0f0f1a';
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();
  // Gradient circle
  const grad = ctx.createLinearGradient(s*0.2, s*0.2, s*0.8, s*0.8);
  grad.addColorStop(0, '#a78bfa');
  grad.addColorStop(1, '#60a5fa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s*0.32, 0, Math.PI * 2);
  ctx.fill();
  // $ symbol
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${s*0.35}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('₿', s/2, s/2 + s*0.02);
}
['c192','c512'].forEach(id => draw(document.getElementById(id)));
</script>
</body>
</html>
